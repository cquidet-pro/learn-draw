  path.stroke{fill:none;stroke:var(--outline);stroke-width:3;stroke-linecap:round;stroke-linejoin:round;}

const NS="http://www.w3.org/2000/svg";
const art=document.getElementById("art"), hintEl=document.getElementById("hint");
art.setAttribute("viewBox", jersey.viewBox);
const outlineSteps = jersey.steps.filter(s=>s.strokes && s.strokes.length);
const colorStep = jersey.steps.find(s=>s.fills);
const reduce = matchMedia("(prefers-reduced-motion: reduce)").matches;
let fillEls=[], strokeItems=[], anims=[], timers=[];

function build(){
  art.innerHTML=""; fillEls=[]; strokeItems=[];
  (colorStep?.fills||[]).forEach(f=>{
    const p=document.createElementNS(NS,"path");
    p.setAttribute("d",f.d); p.setAttribute("fill",f.color); p.setAttribute("class","fill");
    p.style.opacity="0"; art.appendChild(p); fillEls.push(p);
  });
  outlineSteps.forEach((step,si)=>{
    step.strokes.forEach(d=>{
      const p=document.createElementNS(NS,"path");
      p.setAttribute("d",d); p.setAttribute("class","stroke"); art.appendChild(p);
      const L=Math.max(1, (p.getTotalLength&&p.getTotalLength())||120);
      p.style.strokeDasharray=String(L); p.style.strokeDashoffset=String(L);
      strokeItems.push({p,L,si});
    });
  });
}
function clearAll(){ anims.forEach(a=>{try{a.cancel();}catch(e){}}); anims=[]; timers.forEach(clearTimeout); timers=[]; }
function reset(){
  clearAll();
  strokeItems.forEach(({p,L})=>{ p.style.strokeDashoffset=String(L); });
  fillEls.forEach(p=>{ p.style.opacity="0"; });
}
function drawFrom(i){
  if(i>=strokeItems.length) return colorize();
  const {p,L,si}=strokeItems[i];
  hintEl.textContent=outlineSteps[si].hint;
  const dur = reduce?1:Math.min(Math.max(L*5.5,320),1300);
  const a=p.animate([{strokeDashoffset:L},{strokeDashoffset:0}],{duration:dur,easing:"linear",fill:"forwards"});
  anims.push(a);
  a.onfinish=()=>{ p.style.strokeDashoffset="0"; timers.push(setTimeout(()=>drawFrom(i+1),110)); };
}
function colorize(){
  hintEl.textContent=colorStep.hint;
  fillEls.forEach((p,k)=>{
    timers.push(setTimeout(()=>{
      const a=p.animate([{opacity:0},{opacity:1}],{duration:380,fill:"forwards"});
      anims.push(a); a.onfinish=()=>{ p.style.opacity="1"; };
    }, reduce?0:k*140));
  });
  const total=(reduce?0:fillEls.length*140)+500;
  timers.push(setTimeout(()=>{ hintEl.textContent="All done! 🎉 Allez les Bleus!"; timers.push(setTimeout(start,2600)); }, total));
}
function start(){ reset(); requestAnimationFrame(()=>requestAnimationFrame(()=>drawFrom(0))); }
document.getElementById("replay").onclick=start;
build(); start();
</script>
