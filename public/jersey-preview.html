<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Jersey preview — MBAPPE</title>
<style>
  :root { --outline:#15173a; --paper:#fdf6e9; }
  *{box-sizing:border-box;}
  body{margin:0;min-height:100vh;background:var(--paper);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:16px;color:#3a2f55;}
  h1{margin:4px 0 0;font-size:1.4rem;}
  .tag{font-size:.78rem;color:#8a7fa0;margin:0;}
  /* Taller-than-wide frame (problem 1): 200x240 viewBox, ~5:6 portrait card. */
  .stage{width:min(82vw,330px);}
  svg{width:100%;height:auto;background:#fff;border-radius:22px;box-shadow:0 6px 22px #0002;display:block;aspect-ratio:200/240;}
  .hint{font-size:1.12rem;font-weight:700;min-height:1.5em;text-align:center;margin:6px 12px;color:#4a3d6b;}
  .count{font-size:.95rem;font-weight:700;color:#6a5d8b;letter-spacing:.02em;}
  .row{display:flex;gap:10px;align-items:center;justify-content:center;flex-wrap:wrap;margin-top:2px;}
  .btn{font:inherit;font-weight:700;cursor:pointer;border:3px solid #2e86c1;background:#e9f3ff;
    color:#1c5a86;border-radius:999px;padding:9px 18px;}
  .btn:active{transform:translateY(1px);}
  .btn:disabled{opacity:.4;cursor:default;}
  .btn.alt{border-color:#8a6fc1;background:#f1ebff;color:#5a3d96;}
  path.stroke{fill:none;stroke:var(--outline);stroke-width:3;stroke-linecap:round;stroke-linejoin:round;}
  path.fill{stroke:none;}
</style>
</head>
<body>
  <h1>👕 MBAPPE Jersey</h1>
  <p class="tag">private preview · click through each step</p>
  <div class="stage"><svg id="art" preserveAspectRatio="xMidYMid meet"></svg></div>
  <div class="count" id="count">Step 1 / 20</div>
  <div class="hint" id="hint">&nbsp;</div>
  <div class="row">
    <button class="btn" id="prev">◀ Back</button>
    <button class="btn" id="next">Next ▶</button>
  </div>
  <div class="row">
    <button class="btn alt" id="replay">↺ Restart</button>
    <button class="btn alt" id="play">▶▶ Play all</button>
  </div>
<script src="./jersey.steps.js"></script>
<script>
const NS="http://www.w3.org/2000/svg";
const J=window.JERSEY;
const art=document.getElementById("art");
const hintEl=document.getElementById("hint");
const countEl=document.getElementById("count");
const prevBtn=document.getElementById("prev");
const nextBtn=document.getElementById("next");
const replayBtn=document.getElementById("replay");
const playBtn=document.getElementById("play");
const reduce=matchMedia("(prefers-reduced-motion: reduce)").matches;
const N=J.steps.length;
art.setAttribute("viewBox", J.viewBox);

// Fill paint order, bottom -> top, independent of the reveal order.
const ZORDER=["blue-body","blue-sleeves","red","white","name-white"];
// Which step index first reveals each fill group (white shows with the first colour step).
const revealAt={};
let firstColour=-1;
J.steps.forEach((st,i)=>{ if(st.fills){ if(firstColour<0)firstColour=i; if(revealAt[st.fills]===undefined)revealAt[st.fills]=i; }});
if(firstColour>=0){ revealAt.white=firstColour; revealAt["name-white"]=firstColour; }

let cur=0, anims=[], timers=[], playing=false;
function clearTimers(){ anims.forEach(a=>{try{a.cancel();}catch(e){}}); anims=[]; timers.forEach(clearTimeout); timers=[]; }

// Render the picture up to step `i`. If animate, the strokes (or fills) introduced
// at step `i` draw / fade themselves; everything before is shown solid.
function render(i, animate){
  clearTimers();
  art.innerHTML="";
  // 1) fills revealed so far, painted in z-order
  const revealed=new Set();
  ZORDER.forEach(k=>{ if(revealAt[k]!==undefined && revealAt[k]<=i) revealed.add(k); });
  const freshFills=[];
  ZORDER.forEach(k=>{
    if(!revealed.has(k)) return;
    (J.fills[k]||[]).forEach(f=>{
      const p=document.createElementNS(NS,"path");
      p.setAttribute("d",f.d);
      if(f.stroke){ // stroke overlay (e.g. white name on top of navy outline)
        p.setAttribute("class","stroke"); p.setAttribute("stroke",f.stroke);
        p.setAttribute("stroke-width",f.width||2); p.setAttribute("fill","none");
      } else {
        p.setAttribute("class","fill"); p.setAttribute("fill",f.color);
        if(f.evenodd) p.setAttribute("fill-rule","evenodd");
      }
      const justNow = revealAt[k]===i;
      if(animate && justNow){ p.style.opacity="0"; freshFills.push(p); }
      art.appendChild(p);
    });
  });
  // 2) strokes for steps 0..i ; steps < i solid, step i animates
  const fresh=[];
  for(let s=0;s<=i;s++){
    J.steps[s].strokes.forEach(d=>{
      const p=document.createElementNS(NS,"path");
      p.setAttribute("d",d); p.setAttribute("class","stroke"); art.appendChild(p);
      if(s===i && animate){
        const L=Math.max(1,(p.getTotalLength&&p.getTotalLength())||120);
        p.style.strokeDasharray=String(L); p.style.strokeDashoffset=String(L);
        fresh.push({p,L});
      }
    });
  }
  // 3) animate the new content of step i
  if(animate && fresh.length){
    let k=0;
    const drawNext=()=>{
      if(k>=fresh.length) return;
      const {p,L}=fresh[k++];
      const dur=reduce?1:Math.min(Math.max(L*5,260),1100);
      const a=p.animate([{strokeDashoffset:L},{strokeDashoffset:0}],{duration:dur,easing:"linear",fill:"forwards"});
      anims.push(a);
      a.onfinish=()=>{ p.style.strokeDashoffset="0"; timers.push(setTimeout(drawNext, reduce?0:90)); };
    };
    drawNext();
  } else if(animate && freshFills.length){
    // colour step: fade the freshly-revealed group in
    freshFills.forEach((p,k)=>{
      timers.push(setTimeout(()=>{
        const a=p.animate([{opacity:0},{opacity:1}],{duration:reduce?1:360,fill:"forwards"});
        anims.push(a); a.onfinish=()=>{p.style.opacity="1";};
      }, reduce?0:k*110));
    });
  }
  countEl.textContent=`Step ${i+1} / ${N}`;
  hintEl.textContent=J.steps[i].hint;
  prevBtn.disabled=(i<=0);
  nextBtn.disabled=(i>=N-1);
}

function go(i, animate){ cur=Math.max(0,Math.min(N-1,i)); render(cur, animate); }
prevBtn.onclick=()=>{ stopPlay(); go(cur-1,false); };
nextBtn.onclick=()=>{ stopPlay(); go(cur+1,true); };
replayBtn.onclick=()=>{ stopPlay(); go(0,true); };
document.addEventListener("keydown",e=>{
  if(e.key===" "||e.key==="ArrowRight"){ e.preventDefault(); stopPlay(); if(cur<N-1)go(cur+1,true); }
  else if(e.key==="ArrowLeft"||e.key==="Backspace"){ e.preventDefault(); stopPlay(); if(cur>0)go(cur-1,false); }
});

// "Play all" — auto-advance through every step.
function stepDelay(i){ const s=J.steps[i]; const base=s.strokes.length?s.strokes.length*700+500:1600; return reduce?400:base; }
function playFrom(i){
  if(!playing) return;
  go(i,true);
  if(i>=N-1){ playing=false; playBtn.textContent="▶▶ Play all"; return; }
  timers.push(setTimeout(()=>playFrom(i+1), stepDelay(i)));
}
function stopPlay(){ if(playing){ playing=false; playBtn.textContent="▶▶ Play all"; } }
playBtn.onclick=()=>{ if(playing){ stopPlay(); clearTimers(); render(cur,false); } else { playing=true; playBtn.textContent="⏸ Stop"; playFrom(0); } };

// Deep-link to a step for refining: /jersey-preview.html#7 jumps to step 7.
function fromHash(){ const m=/^#(\d+)$/.exec(location.hash); return m?Math.max(1,Math.min(N,+m[1]))-1:null; }
window.addEventListener("hashchange",()=>{ const h=fromHash(); if(h!==null){ stopPlay(); go(h,false); } });
const h0=fromHash();
go(h0!==null?h0:0, h0===null);
</script>
</body>
</html>
