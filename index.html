    <meta name="apple-mobile-web-app-title" content="Kidoo" />

    <!-- Apply the saved (or system) theme before paint to avoid a flash. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("learn-draw:theme");
          if (t !== "dark" && t !== "light") {
            t =
              window.matchMedia &&
              window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
          }
          document.documentElement.setAttribute("data-theme", t);
          var m = document.querySelector('meta[name="theme-color"]');
          if (m) m.setAttribute("content", t === "dark" ? "#181824" : "#ffd166");
        } catch (e) {}
      })();
    </script>

  <body>
    <div id="root">
      <!-- Static fallback for crawlers / AI agents that don't run JavaScript.
           The React app replaces this on load. -->
      <noscript>
        <main>
          <h1>Learn to Draw! 🎨</h1>
          <p>
            Learn to Draw is a free, ad-free, no-tracking website that teaches
            young children to draw step by step. Each drawing is broken into
            simple steps, and every step animates its strokes "drawing
            themselves" so kids can follow along.
          </p>
          <h2>What you can do</h2>
          <ul>
            <li>Follow step-by-step tutorials for animals, objects and scenes.</li>
            <li>Choose a difficulty: Easy, Medium or Harder.</li>
            <li>Draw original pictures inspired by famous public-domain paintings.</li>
            <li>Print coloring pages to color in on paper.</li>
            <li>Use hands-free voice control to pick and play drawings.</li>
            <li>Earn stickers as you finish drawings.</li>
          </ul>

            No sign-up, no ads, no tracking - and it works offline once loaded.
            This page needs JavaScript enabled to run the interactive app.
